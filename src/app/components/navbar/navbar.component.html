<header
  class="fixed top-0 left-0 right-0 z-40 transition-all duration-300 navbar-header"
  [class.navbar-scrolled]="scrolled()"
>
  <nav class="w-full max-w-5xl mx-auto px-4 sm:px-6 h-16 flex items-center justify-between">

    <!-- Logo -->
      <a routerLink="/"
       class="text-lg sm:text-xl tracking-tight transition-colors flex-shrink-0"
       style="font-family: 'Syne', sans-serif; font-weight: 700; color: var(--color-text)">
      <span style="color: var(--color-accent)">vm</span><span style="color: var(--color-text-muted); font-weight: 400">.</span>
    </a>

    <!-- Desktop links -->
    <div class="hidden md:flex items-center gap-6 lg:gap-8">
      @for (link of links; track link.path) {
        <a
          [routerLink]="link.path"
          routerLinkActive="active-link"
          [routerLinkActiveOptions]="{ exact: link.exact ?? false }"
          class="nav-link text-sm font-medium transition-colors cursor-pointer"
          style="color: var(--color-text-muted)"
        >
          {{ link.key | translate }}
        </a>
      }
    </div>

    <!-- Right controls -->
    <div class="flex items-center gap-1 sm:gap-2">
      <!-- Lang toggle -->
      <button
        (click)="toggleLang()"
        class="text-xs font-semibold tracking-wider px-2.5 py-1 rounded border transition-colors hover:border-[var(--color-accent)] hover:text-[var(--color-accent)] cursor-pointer"
        style="color: var(--color-text-muted); border-color: var(--color-border)"
      >
        {{ currentLang() === 'pt' ? 'EN' : 'PT' }}
      </button>

      <!-- Theme toggle -->
      <button
        (click)="themeService.toggle()"
        class="p-2 rounded-md transition-all hover:bg-[var(--color-surface)] cursor-pointer"
        style="color: var(--color-text-muted)"
      >
        @if (themeService.isDark()) {
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
          </svg>
        } @else {
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
          </svg>
        }
      </button>

      <!-- Mobile hamburger -->
      <button
        class="md:hidden p-2 transition-colors cursor-pointer"
        style="color: var(--color-text-muted)"
        (click)="mobileOpen.update(v => !v)"
      >
        @if (mobileOpen()) {
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        } @else {
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        }
      </button>
    </div>
  </nav>

  <!-- Mobile drawer -->
  @if (mobileOpen()) {
    <div class="md:hidden px-6 py-4 flex flex-col gap-4 border-t"
         style="background-color: var(--color-bg); border-color: var(--color-border)">
      @for (link of links; track link.path) {
        <a
          [routerLink]="link.path"
          (click)="mobileOpen.set(false)"
          class="text-sm font-medium transition-colors hover:text-[var(--color-accent)] cursor-pointer"
          style="color: var(--color-text-muted)"
        >
          {{ link.key | translate }}
        </a>
      }
    </div>
  }
</header>
