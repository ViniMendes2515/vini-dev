<section class="max-w-5xl mx-auto px-4 sm:px-6 py-16 sm:py-24">
  <div appFadeIn class="mb-16">
    <p class="text-sm font-semibold uppercase tracking-widest mb-2"
       style="color: var(--color-accent)">
      {{ 'projects.subtitle' | translate }}
    </p>
    <h1 class="text-3xl sm:text-4xl font-bold tracking-tight"
        style="color: var(--color-text)">
      {{ 'projects.title' | translate }}
    </h1>
  </div>

  <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
    @for (project of projects; track project.name; let i = $index) {
      <div appFadeIn [fadeDelay]="i * 80">
        <app-project-card [project]="project" />
      </div>
    }
  </div>
</section>
